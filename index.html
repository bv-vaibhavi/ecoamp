<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ECOAMP – Energy Monitor</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#34d399" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ECOAMP" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- SEO / Social -->
    <meta name="description" content="Know what's consuming your electricity — down to every appliance." />
    <meta name="keywords" content="electricity monitor, energy tracker, appliance consumption, electricity bill" />
    <meta property="og:title" content="ECOAMP – Energy Monitor" />
    <meta property="og:description" content="Know what's consuming your electricity — down to every appliance." />
    <meta property="og:image" content="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0f1a; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0f1a; }
      ::-webkit-scrollbar-thumb { background: #1a2235; border-radius: 99px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(() => console.log("SW registered"))
            .catch((e) => console.log("SW failed:", e));
        });
      }
    </script>
  </body>
</html>
